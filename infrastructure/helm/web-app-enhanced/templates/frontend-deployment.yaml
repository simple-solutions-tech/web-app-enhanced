apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "web-app-enhanced.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "web-app-enhanced.labels" . | nindent 4 }}
    {{- include "web-app-enhanced.frontend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "web-app-enhanced.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "web-app-enhanced.frontend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_API_URL
              value: {{ .Values.frontend.env.reactAppApiUrl | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}

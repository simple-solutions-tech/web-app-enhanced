{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "web-app-enhanced.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "web-app-enhanced.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "web-app-enhanced.fullname" . }}-backend
                port:
                  number: 8080
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: {{ include "web-app-enhanced.fullname" . }}-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "web-app-enhanced.fullname" . }}-frontend
                port:
                  number: 80
{{- end }}

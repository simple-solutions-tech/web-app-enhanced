name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      EKS_CLUSTER: ${{ secrets.EKS_CLUSTER_NAME }}
      NAMESPACE: ${{ secrets.K8S_NAMESPACE }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: helm/helm-action@v1

      - name: Deploy
        run: |
          helm upgrade --install web-app-enhanced \
            infrastructure/helm/web-app-enhanced \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values infrastructure/helm/web-app-enhanced/values-dev.yaml \
            --set backend.image.repository=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_BACKEND_REPO }} \
            --set backend.image.tag=${{ github.event.workflow_run.head_sha }} \
            --set frontend.image.repository=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_FRONTEND_REPO }} \
            --set frontend.image.tag=${{ github.event.workflow_run.head_sha }} \
            --set backend.serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ secrets.BACKEND_IRSA_ROLE_ARN }} \
            --wait
